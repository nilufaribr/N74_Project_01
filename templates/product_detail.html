{% extends 'base.html' %}

{% block content %}
    <div class="mx-auto max-w-[1120px] grid grid-cols-12 gap-10 mt-10">
        <img src="{{ product.image.url }}" class="col-span-6 rounded-xl">
        <div class="col-span-6 flex flex-col gap-4">
            <div class="flex flex-col gap-4">
                <div class="w-[250px] flex flex-row items-center justify-between">
                    <button id="minusBtn" class="bg-yellow-500 text-white py-2 px-8 rounded-lg hover:cursor-pointer hover:bg-yellow-600 active:bg-yellow-700 active:scale-95 transition">-</button>
                    <input id="displayValue" value="1" disabled type="text" class="text-gray-500 max-w-[100px] focus:outline-none py-1.5 border-2 border-gray-400 rounded-lg text-center">
                    <button id="plusBtn" class="bg-yellow-500 text-white py-2 px-8 rounded-lg hover:cursor-pointer hover:bg-yellow-600 active:bg-yellow-700 active:scale-95 transition">+</button>
                </div>
                <button class="flex flex-row items-center justify-center gap-1 w-[250px] bg-yellow-500 text-white py-2 px-8 rounded-lg hover:cursor-pointer hover:bg-yellow-600 active:bg-yellow-700 active:scale-95 transition">
                    <span class="material-icons">shopping_cart</span>
                    Sotib olish
                </button>
            </div>
            <h2 class="text-gray-700 text-3xl">{{ product.name }}</h2>
            <p class="text-gray-500">{{ product.description|linebreaksbr }}</p>
        </div>
    </div>

    <script type="text/javascript">
        const minusBtn = document.getElementById("minusBtn");
        const displayValue = document.getElementById("displayValue");
        const plusBtn = document.getElementById("plusBtn");

        plusBtn.addEventListener("click", () => {
            displayValue.value = Number(displayValue.value) + 1
        })

        minusBtn.addEventListener("click", () => {
            const result = Number(displayValue.value) - 1;
            if (result >= 1) {
                displayValue.value = result
            }
        })

    </script>
{% endblock content %}
